<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:halo="https://halo.run">
<head th:replace="~{fragments/head :: head(null)}"></head>
<body th:attr="data-font=${theme.config.style.font_family}">
  <aside th:replace="~{fragments/sidebar :: sidebar('index')}"></aside>
  <div class="sidebar-mask" data-sidebar-mask></div>

  <div class="main-wrapper">
    <header th:replace="~{fragments/topbar :: topbar}"></header>

    <main class="site-main">
    <div class="container">
      <div class="page-head">
        <h1 class="page-title" th:text="${site.title}">站点标题</h1>
        <p class="page-subtitle" th:if="${!#strings.isEmpty(site.subtitle)}"
           th:text="${site.subtitle}">站点副标题</p>
      </div>

      <!--/* On the first page, split pinned posts into a featured row. */-->
      <th:block th:if="${posts != null and !posts.items.isEmpty() and !posts.hasPrevious}"
                th:with="pinned=${posts.items.?[spec.pinned]}">
        <section class="featured" th:if="${pinned != null and !pinned.isEmpty()}">
          <p class="section-label">置顶推荐</p>
          <div class="post-list">
            <th:block th:each="post : ${pinned}">
              <th:block th:replace="~{fragments/post-card :: card(${post})}"></th:block>
            </th:block>
          </div>
        </section>
      </th:block>

      <th:block th:with="latest=${posts == null ? null
                          : (!posts.hasPrevious ? posts.items.?[!spec.pinned] : posts.items)}">
        <p class="section-label" th:if="${latest != null and !latest.isEmpty()}">最新文章</p>

        <div class="post-list" th:if="${latest != null and !latest.isEmpty()}">
          <th:block th:each="post : ${latest}">
            <th:block th:replace="~{fragments/post-card :: card(${post})}"></th:block>
          </th:block>
        </div>
      </th:block>

      <div class="empty" th:if="${posts == null or posts.items.isEmpty()}">
        <span class="empty__emoji">🪶</span>
        <p>还没有任何文章</p>
      </div>

      <nav th:replace="~{fragments/pagination :: pagination(${posts})}"></nav>
    </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
  </div>
</body>
</html>
