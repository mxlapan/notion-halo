<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:halo="https://halo.run">
<head th:replace="~{fragments/head :: head(${post.spec.title})}"></head>
<body th:attr="data-font=${theme.config.style.font_family}">
  <aside th:replace="~{fragments/sidebar :: sidebar('')}"></aside>
  <div class="sidebar-mask" data-sidebar-mask></div>

  <div class="main-wrapper">
    <header th:replace="~{fragments/topbar :: topbar}"></header>

    <main class="site-main">
      <!-- 3-column reading shell: gutter | centered content | TOC rail.
           has-toc is added only when the article actually contains headings,
           so heading-less posts still center cleanly with no empty rail. -->
      <div class="post-grid"
           th:classappend="${theme.config.post.show_toc
                            and post.content != null and post.content.content != null
                            and (#strings.contains(post.content.content, '&lt;h2')
                                 or #strings.contains(post.content.content, '&lt;h3')
                                 or #strings.contains(post.content.content, '&lt;h4'))} ? 'has-toc'">
      <div class="post-col">

      <img class="post-cover"
           th:if="${!#strings.isEmpty(post.spec.cover)}"
           th:src="${post.spec.cover}" th:alt="${post.spec.title}" />

      <!-- title block -->
      <div class="page-head"
           th:with="postEmoji=${post.metadata.annotations != null ? (post.metadata.annotations['notion-halo/emoji'] ?: post.metadata.annotations['emoji']) : null}"
           th:classappend="${!#strings.isEmpty(post.spec.cover)} ? 'has-cover'">
        <span class="page-head__emoji page-head__emoji--overlap"
              th:if="${!#strings.isEmpty(postEmoji)}"
              th:text="${postEmoji}">📝</span>
        <div class="breadcrumbs">
          <a href="/">🏠 首页</a>
          <span class="breadcrumbs__separator">/</span>
          <th:block th:if="${post.categories != null and !post.categories.isEmpty()}">
            <a th:href="${post.categories[0].status.permalink}" th:text="${post.categories[0].spec.displayName}">分类</a>
            <span class="breadcrumbs__separator">/</span>
          </th:block>
          <span class="breadcrumbs__current" th:text="${post.spec.title}">当前文章</span>
        </div>
        <h1 class="page-title" th:text="${post.spec.title}">文章标题</h1>

        <div class="meta" th:if="${theme.config.post.show_meta}" style="margin-top:14px">
          <span class="meta__item" th:if="${post.categories != null and !post.categories.isEmpty()}">
            📁
            <th:block th:each="cat,iter : ${post.categories}">
              <a th:href="${cat.status.permalink}" th:text="${cat.spec.displayName}">分类</a><th:block th:if="${!iter.last}">,</th:block>
            </th:block>
          </span>
          <span class="meta__item" th:if="${post.spec.publishTime != null}">
            📅 <span th:text="${#temporals.format(post.spec.publishTime, 'yyyy-MM-dd')}">2026-05-29</span>
          </span>
          <span class="meta__item"
                th:if="${theme.config.post.show_reading_time and post.content != null and post.content.content != null}"
                th:with="mins=${post.content.content.length() / 800 + 1}">
            ⏱ <span data-reading-time th:text="${mins} + ' 分钟阅读'">3 分钟阅读</span>
          </span>
          <span class="meta__item" th:if="${post.stats != null}">👁 <span th:text="${post.stats.visit}">0</span></span>
        </div>
      </div>

      <!-- article body -->
      <article class="prose" data-prose th:utext="${post.content.content}">
        <p>文章正文……</p>
      </article>

      <!-- tags (left) + share (right) -->
      <div class="post-actions"
           th:with="shareUrl=${site.url != null and !#strings.isEmpty(site.url) ? site.url + post.status.permalink : post.status.permalink},
                    shareTitle=${post.spec.title}">
        <div class="post-tags" th:if="${post.tags != null and !post.tags.isEmpty()}">
          <a th:each="tag : ${post.tags}" class="pill pill--blue"
             th:href="${tag.status.permalink}" th:text="${tag.spec.displayName}">标签</a>
        </div>
        <div class="post-share">
          <span class="post-share__label">分享</span>
          <button class="post-share__btn" type="button" data-share-copy
                  th:attr="data-url=${shareUrl}" title="复制链接" aria-label="复制链接">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
            </svg>
          </button>
          <a class="post-share__btn" target="_blank" rel="noopener noreferrer"
             title="分享到 X" aria-label="分享到 X"
             th:href="@{https://twitter.com/intent/tweet(url=${shareUrl},text=${shareTitle})}">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor" aria-hidden="true">
              <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24h-6.66l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>
          </a>
        </div>
      </div>

      <!-- copyright / license -->
      <aside class="post-copyright"
             th:if="${theme.config.post.show_copyright}"
             th:with="fullUrl=${site.url != null and !#strings.isEmpty(site.url) ? site.url + post.status.permalink : post.status.permalink}">
        <div class="post-copyright__row">
          <span class="post-copyright__label">本文标题</span>
          <span class="post-copyright__value" th:text="${post.spec.title}">文章标题</span>
        </div>
        <div class="post-copyright__row">
          <span class="post-copyright__label">本文链接</span>
          <a class="post-copyright__value post-copyright__link" th:href="${fullUrl}" th:text="${fullUrl}">链接</a>
        </div>
        <div class="post-copyright__row" th:if="${!#strings.isEmpty(theme.config.post.copyright_notice)}">
          <span class="post-copyright__label">版权声明</span>
          <span class="post-copyright__value" th:text="${theme.config.post.copyright_notice}">版权说明</span>
        </div>
      </aside>

      <!-- related posts: other posts from the same primary category -->
      <th:block th:if="${theme.config.post.show_related and post.categories != null and !post.categories.isEmpty()}"
                th:with="related=${postFinder.listByCategory(1, 4, post.categories[0].metadata.name).items}">
        <section class="related" th:if="${related != null and related.size() > 1}">
          <h3 class="related__title">相关文章</h3>
          <div class="related__grid">
            <th:block th:each="rp : ${related}">
              <a th:if="${rp.metadata.name != post.metadata.name}"
                 class="related__card" th:href="${rp.status.permalink}">
                <span class="related__name" th:text="${rp.spec.title}">相关文章标题</span>
                <span class="related__date" th:if="${rp.spec.publishTime != null}"
                      th:text="${#temporals.format(rp.spec.publishTime, 'yyyy-MM-dd')}">2026-01-01</span>
              </a>
            </th:block>
          </div>
        </section>
      </th:block>

      <!-- prev / next -->
      <nav class="post-nav" th:with="cursor=${postFinder.cursor(post.metadata.name)}"
           th:if="${cursor != null and (cursor.hasPrevious() or cursor.hasNext())}">
        <a class="post-nav__item prev" th:if="${cursor.hasPrevious()}"
           th:href="${cursor.previous.status.permalink}">
          <div class="post-nav__label">← 上一篇</div>
          <div class="post-nav__title" th:text="${cursor.previous.spec.title}">上一篇标题</div>
        </a>
        <span th:unless="${cursor.hasPrevious()}"></span>
        <a class="post-nav__item next" th:if="${cursor.hasNext()}"
           th:href="${cursor.next.status.permalink}">
          <div class="post-nav__label">下一篇 →</div>
          <div class="post-nav__title" th:text="${cursor.next.spec.title}">下一篇标题</div>
        </a>
      </nav>

      <!-- comments -->
      <section class="comment-section"
               th:if="${theme.config.post.enable_comment}">
        <h3 class="comment-section__title">评论</h3>
        <halo:comment group="content.halo.run" kind="Post"
                      th:attr="name=${post.metadata.name}"></halo:comment>
      </section>

      </div><!-- /.post-col -->

      <!-- TOC rail: sits in the right gutter, sticky; never squeezes the body -->
      <aside class="toc" data-toc data-toc-wrap th:if="${theme.config.post.show_toc}">
        <p class="toc__title">目录</p>
        <ul></ul>
      </aside>

    </div><!-- /.post-grid -->
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
  </div>
</body>
</html>
